version: "3.9"

services:
  torrentvault:
    build: .
    container_name: torrentvault
    restart: unless-stopped
    ports:
      - "8000:8000"       # API
      - "6881-6891:6881-6891/tcp"   # BitTorrent TCP
      - "6881-6891:6881-6891/udp"   # BitTorrent UDP / DHT
    volumes:
      - ./downloads:/downloads
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - DOWNLOAD_DIR=/downloads
      - ALLOWED_ORIGINS=http://localhost:3000
      - ALLOWED_HOSTS=localhost,127.0.0.1,${DOMAIN:-localhost}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: false
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  downloads:
  data:
